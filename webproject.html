<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunshiney Reads</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
    <style>
        /* --- PALET WARNA PINKY CANTIK --- */
        :root {
            --bg-color: #FFF0F3; 
            --primary: #FFC4D9; 
            --primary-dark: #FF8FAB; 
            --secondary: #FFE5EC; 
            --accent: #FB6F92; 
            --purple-pastel: #FFD6E0; 
            --text-dark: #7B5061; 
            --white: #FFFFFF;
            --shelf-color: #FFDDE6; 
            --shelf-shadow: #FFA6C1; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Lora', serif; 
            background-color: var(--bg-color); 
            background-image: 
                radial-gradient(rgba(255, 143, 171, 0.15) 15%, transparent 16%),
                radial-gradient(rgba(255, 196, 217, 0.4) 15%, transparent 16%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: var(--text-dark); 
            overflow-x: hidden; 
        }
        
        h1, h2, h3 { font-family: 'Playfair Display', serif; font-weight: 500; color: var(--text-dark); }

        /* --- OPENING LOGIN & MULTI-ACCOUNT --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; justify-content: center; align-items: center; z-index: 2000;
            background: var(--bg-color);
        }
        .curtain {
            position: absolute; top: 0; width: 50%; height: 100%;
            background: var(--primary);
            transition: transform 1.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            z-index: 2001; 
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.02);
        }
        .curtain.left { left: 0; border-right: 1px solid var(--primary-dark); }
        .curtain.right { right: 0; border-left: 1px solid var(--primary-dark); }
        
        .open-curtain .curtain.left { transform: translateX(-100%); }
        .open-curtain .curtain.right { transform: translateX(100%); }

        .login-box {
            position: relative; z-index: 2002; background: rgba(255, 255, 255, 0.95);
            padding: 50px 45px; text-align: center;
            box-shadow: 0 10px 40px rgba(255, 143, 171, 0.15); 
            border: 2px solid var(--primary-dark); border-radius: 20px;
            transition: opacity 0.8s ease, transform 0.8s ease;
            max-width: 480px; width: 90%;
        }
        .open-curtain .login-box { opacity: 0; pointer-events: none; transform: translateY(-20px); }
        .login-box h1 { margin-bottom: 5px; font-size: 2.5em; letter-spacing: 1px; color: var(--primary-dark); }
        .login-box p.subtitle { font-size: 1.05em; color: #9E7382; margin-bottom: 25px; font-style: italic; }

        /* Input Login Form */
        .login-input-group { margin-bottom: 25px; }
        .login-input {
            width: 100%; padding: 12px 15px; border: 2px solid var(--primary); border-radius: 12px;
            font-family: 'Lora', serif; background: var(--bg-color); color: var(--text-dark);
            outline: none; transition: 0.3s; font-size: 1em; text-align: center;
        }
        .login-input:focus { border-color: var(--primary-dark); background: white; }

        /* Toggle Tipe Akun */
        .acc-toggle-container {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 25px;
        }
        .acc-toggle-container input[type="radio"] { display: none; }
        .acc-toggle-label {
            padding: 8px 20px; border-radius: 20px; border: 2px solid var(--primary-dark);
            color: var(--primary-dark); cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 0.9em;
        }
        .acc-toggle-container input[type="radio"]:checked + .acc-toggle-label {
            background: var(--primary-dark); color: white;
        }

        .btn {
            background-color: var(--primary-dark); color: white; border: none;
            padding: 12px 35px; font-size: 1.05em; font-family: 'Lora', serif;
            letter-spacing: 0.5px; cursor: pointer; transition: 0.3s; border-radius: 30px;
            width: 100%;
        }
        .btn:hover { background-color: var(--accent); transform: translateY(-2px); }
        
        .btn-outline { background: transparent; border: 1px solid var(--primary-dark); color: var(--text-dark); width: auto;}
        .btn-outline:hover { background: var(--primary); color: var(--text-dark); }

        /* --- LANGUAGE SWITCHER --- */
        .lang-switch {
            position: absolute; top: 20px; right: 30px; z-index: 2100; display: flex; gap: 10px;
        }
        .lang-btn {
            background: transparent; border: none; font-family: 'Lora', serif;
            color: var(--text-dark); cursor: pointer; font-size: 1em; opacity: 0.5; transition: 0.3s;
        }
        .lang-btn.active { opacity: 1; font-weight: bold; border-bottom: 1px solid var(--text-dark); }

        /* --- MAIN DASHBOARD & RAK BUKU --- */
        #main-app { display: none; padding: 50px 20px 60px 20px; max-width: 1050px; margin: 0 auto; opacity: 0; transition: opacity 1s; }
        
        /* User Tag Indicator */
        .user-tag {
            text-align: center; background: white; border: 1px dashed var(--primary-dark);
            display: inline-block; padding: 5px 20px; border-radius: 20px; 
            color: var(--primary-dark); font-size: 0.9em; font-weight: bold; margin-bottom: 15px;
        }

        .header { text-align: center; margin-bottom: 35px; }
        .header h1 { font-size: 3em; letter-spacing: 1.5px; margin-bottom: 10px; color: var(--primary-dark); }
        .top-actions { display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; }

        /* Struktur Rak Buku Estetik */
        #library-container { display: flex; flex-direction: column; gap: 85px; margin-top: 30px; }
        .shelf-row {
            display: flex; flex-wrap: wrap; align-items: flex-end; gap: 35px;
            padding: 0 40px 10px 40px; position: relative; min-height: 200px;
            border-bottom: 18px solid var(--shelf-color);
            box-shadow: 0 12px 15px -10px var(--shelf-shadow);
        }

        /* --- DESAIN BUKU 3D HD --- */
        .book-spine {
            width: 120px; height: 180px; 
            background-color: var(--primary); background-size: cover; background-position: center;
            border-radius: 3px 12px 12px 3px; cursor: pointer; position: relative;
            box-shadow: 
                inset 6px 0 10px rgba(0,0,0,0.15), inset -2px 0 5px rgba(255,255,255,0.6), 
                5px 5px 12px rgba(255, 143, 171, 0.2), 8px 0px 0px #FFFCFA, 9px 3px 6px rgba(255, 143, 171, 0.3); 
            border-left: 1px solid rgba(255,255,255,0.5);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.6s;
        }
        .book-spine:hover { 
            transform: translateY(-20px) rotate(-3deg) scale(1.05); 
            box-shadow: 
                inset 6px 0 10px rgba(0,0,0,0.15), inset -2px 0 5px rgba(255,255,255,0.6), 
                15px 20px 25px rgba(255, 143, 171, 0.3), 8px 0px 0px #FFFCFA, 10px 15px 15px rgba(255, 143, 171, 0.2); 
            z-index: 10; 
        }

        /* --- MODALS (POPUP FORM) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 240, 243, 0.85); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 3000;
            opacity: 0; transition: opacity 0.4s ease;
        }
        .modal-content {
            background: var(--white); padding: 45px; width: 90%; max-width: 650px; 
            max-height: 85vh; overflow-y: auto; position: relative;
            border: 2px solid var(--primary-dark); border-radius: 20px;
            box-shadow: 0 15px 40px rgba(255, 143, 171, 0.2);
            transform: translateY(20px); transition: transform 0.4s ease;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .close-btn {
            position: absolute; top: 20px; right: 25px; font-size: 1.5em;
            cursor: pointer; color: var(--primary-dark); transition: opacity 0.3s, transform 0.3s; opacity: 0.6; z-index: 50;
        }
        .close-btn:hover { opacity: 1; transform: scale(1.1); }

        /* --- DESAIN BUKU TERBUKA (UNTUK DETAIL BUKU) --- */
        .modal-content.book-modal-container {
            background: transparent; border: none; box-shadow: none;
            max-width: 900px; padding: 0; overflow: visible; display: flex;
        }
        .book-spread {
            display: flex; width: 100%; background: #FFFEFD; border-radius: 5px 15px 15px 5px;
            box-shadow: 0 25px 60px rgba(255, 143, 171, 0.2), inset 0 0 50px rgba(255, 196, 217, 0.15);
            position: relative; transform-style: preserve-3d; perspective: 1500px;
        }
        .book-spread::before {
            content: ''; position: absolute; top: 0; left: 50%; width: 50px; height: 100%; transform: translateX(-50%);
            background: linear-gradient(to right, transparent, rgba(255, 143, 171, 0.08) 45%, rgba(255,255,255,0.8) 50%, rgba(255, 143, 171, 0.08) 55%, transparent);
            z-index: 5; pointer-events: none;
        }

        .page-left, .page-right { flex: 1; padding: 40px 45px; position: relative; min-width: 50%; }
        .page-left { border-right: 1px solid rgba(255, 196, 217, 0.3); transform-origin: right center; }

        /* Animasi MEMBUKA Buku */
        .modal-overlay.active:not(.closing) .page-left { animation: turnPageLeft 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .modal-overlay.active:not(.closing) .page-right { animation: fadeInPageRight 0.8s ease-in forwards; }

        /* Animasi MENUTUP Buku */
        .modal-overlay.closing .page-left { animation: closePageLeft 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards !important; }
        .modal-overlay.closing .page-right { animation: fadeOutPageRight 0.5s ease-out forwards !important; }

        @keyframes turnPageLeft {
            0% { transform: rotateY(90deg) skewY(-5deg); opacity: 0; filter: brightness(0.5); }
            100% { transform: rotateY(0deg) skewY(0deg); opacity: 1; filter: brightness(1); }
        }
        @keyframes fadeInPageRight {
            0% { opacity: 0; transform: translateX(-15px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        @keyframes closePageLeft {
            0% { transform: rotateY(0deg) skewY(0deg); opacity: 1; filter: brightness(1); }
            100% { transform: rotateY(90deg) skewY(-5deg); opacity: 0; filter: brightness(0.5); }
        }
        @keyframes fadeOutPageRight {
            0% { opacity: 1; transform: translateX(0); }
            100% { opacity: 0; transform: translateX(-15px); }
        }

        .detail-cover-3d {
            width: 100%; max-width: 180px; height: auto; aspect-ratio: 2/3; object-fit: cover;
            border-radius: 2px 10px 10px 2px;
            box-shadow: inset 4px 0 8px rgba(0,0,0,0.1), 6px 6px 15px rgba(255, 143, 171, 0.25);
            margin: 0 auto 25px auto; display: block;
        }

        .detail-title { font-size: 2em; margin-bottom: 5px; line-height: 1.2; text-align: center; color: var(--primary-dark); }
        .detail-author { font-style: italic; color: var(--text-dark); font-size: 1.1em; margin-bottom: 15px; text-align: center; opacity: 0.8; }
        
        /* Grid Info Rapi */
        .book-meta-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 25px; padding-top: 25px;
            border-top: 2px dashed var(--primary); text-align: center;
        }
        .meta-item { display: flex; flex-direction: column; gap: 4px; }
        .meta-label { font-size: 0.75em; color: var(--primary-dark); font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .meta-value { font-size: 0.9em; color: var(--text-dark); font-weight: bold; line-height: 1.2; }

        .bubble-chat {
            background: var(--bg-color); color: var(--text-dark); padding: 20px;
            border-left: 4px solid var(--primary-dark); margin: 25px 0; 
            font-style: italic; font-size: 1.05em; line-height: 1.6;
            box-shadow: 2px 2px 10px rgba(255, 196, 217, 0.15); border-radius: 0 10px 10px 0;
        }

        @media (max-width: 768px) {
            .book-spread { flex-direction: column; border-radius: 10px; }
            .book-spread::before { display: none; }
            .page-left, .page-right { min-width: 100%; padding: 30px; border: none; }
            .modal-overlay.active:not(.closing) .page-left, .modal-overlay.closing .page-left { animation: none !important; transform: none !important; }
            .modal-overlay.active .modal-content { animation: fadeInPageRight 0.5s ease forwards; }
        }

        /* Form Input Standar */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, textarea, select {
            width: 100%; padding: 12px 15px; border: 1px solid var(--primary); border-radius: 10px;
            font-family: 'Lora', serif; background: var(--bg-color); color: var(--text-dark); outline: none; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary-dark); background: white; }
        .full-width { grid-column: span 2; }
        
        .upload-area {
            border: 2px dashed var(--primary-dark); border-radius: 15px; padding: 25px; text-align: center;
            background: transparent; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .upload-area:hover { background: rgba(255, 196, 217, 0.15); }
        #coverPreview { max-width: 120px; display: none; margin-top: 15px; box-shadow: 0 4px 12px rgba(255, 143, 171, 0.2); border-radius: 5px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <!-- Language Switcher -->
    <div class="lang-switch">
        <button class="lang-btn active" onclick="switchLanguage('id')">ID</button>
        <button class="lang-btn" onclick="switchLanguage('en')">EN</button>
    </div>

    <!-- Opening Login Elegan (With Account System) -->
    <div id="login-screen">
        <div class="curtain left"></div>
        <div class="curtain right"></div>

        <div class="login-box">
            <h1 data-i18n="welcomeTitle">Koleksi Buku Klasik</h1>
            <p class="subtitle" data-i18n="welcomeDesc">Ruang tenang untuk menyimpan dan mengenang bacaan favoritmu.</p>
            
            <!-- Sistem Multi Akun -->
            <div class="login-input-group">
                <input type="text" id="usernameInput" class="login-input" placeholder="Ketik nama akun/grup di sini..." required>
            </div>
            <div class="acc-toggle-container">
                <input type="radio" id="typePers" name="accType" value="personal" checked>
                <label for="typePers" class="acc-toggle-label" data-i18n="typePersonal">👤 Personal</label>
                
                <input type="radio" id="typeGroup" name="accType" value="group">
                <label for="typeGroup" class="acc-toggle-label" data-i18n="typeGroup">👥 Bookclub/Grup</label>
            </div>

            <button class="btn" onclick="prosesLogin()" data-i18n="openBtn">Buka Tirai Koleksi</button>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="main-app">
        <div class="header">
            <!-- Menampilkan siapa yang sedang login -->
            <div class="user-tag" id="activeUserDisplay">👤 User</div>
            <h1 data-i18n="mainTitle">Rak Buku Pribadi</h1>
        </div>

        <div class="top-actions">
            <button class="btn" style="width:auto;" onclick="bukaModalTambah()" data-i18n="addBtn">Tambah Buku Baru</button>
            <button class="btn btn-outline" onclick="keluarPerpustakaan()" data-i18n="closeBtn">Tutup & Logout</button>
        </div>

        <div id="library-container">
            <!-- Di-render oleh JS -->
        </div>
    </div>

    <!-- Modal Form Tambah/Edit -->
    <div class="modal-overlay" id="modalForm">
        <div class="modal-content">
            <span class="close-btn" onclick="tutupModal('modalForm')">✖</span>
            <h2 id="modalFormTitle" style="margin-bottom: 25px; text-align: center; color: var(--primary-dark);" data-i18n="formTitle">Tambah Buku Koleksi</h2>
            <form id="book-form" class="form-grid">
                <div class="full-width">
                    <label class="upload-area" for="fileCover">
                        <div style="font-family: 'Playfair Display', serif; font-size: 1.2em; margin-bottom: 5px; color: var(--text-dark);" data-i18n="uploadTitle">Unggah Sampul Buku HD</div>
                        <div style="font-size: 0.85em; color: var(--primary-dark);" data-i18n="uploadDesc">(Format gambar dari perangkat Anda)</div>
                        <img id="coverPreview" src="" alt="Preview Cover">
                    </label>
                    <input type="file" id="fileCover" accept="image/*">
                </div>

                <input type="text" id="judul" placeholder="Judul Buku / Title" required>
                <input type="text" id="penulis" placeholder="Penulis / Author" required>
                <input type="text" id="penerbit" placeholder="Penerbit / Publisher">
                <input type="number" id="halaman" placeholder="Jumlah Halaman / Pages">
                <input type="date" id="tanggalTerbit">
                
                <div style="display: flex; align-items: center; gap: 10px;">
                    <label data-i18n="ratingLabel" style="color: var(--primary-dark); font-weight: bold;">Rating (1-10):</label>
                    <input type="number" id="rating" min="1" max="10" placeholder="10" style="width: 80px;" required>
                </div>

                <input type="text" id="cocokSaat" placeholder="Waktu terbaik membaca ini / Best time to read" class="full-width">
                <textarea id="review" placeholder="Tulis catatan atau review Anda / Write your review..." rows="4" class="full-width" required></textarea>
                <textarea id="bubble" placeholder="Kutipan favorit atau opini singkat / Favorite quote or short opinion" rows="2" class="full-width" required></textarea>

                <button type="submit" id="submitFormBtn" class="btn full-width" style="margin-top: 15px;" data-i18n="saveBtn">Simpan ke Rak</button>
            </form>
        </div>
    </div>

    <!-- Modal Detail Buku -->
    <div class="modal-overlay" id="modalDetail">
        <div class="modal-content book-modal-container" id="detailContent">
            <!-- Di-render oleh JS -->
        </div>
    </div>

    <script>
        // --- Sistem Terjemahan (i18n) ---
        const translations = {
            id: {
                welcomeTitle: "Koleksi Buku Klasik",
                welcomeDesc: "Ruang tenang untuk menyimpan dan mengenang bacaan favoritmu.",
                typePersonal: "👤 Personal",
                typeGroup: "👥 Bookclub/Grup",
                openBtn: "Buka Tirai Koleksi",
                mainTitle: "Rak Buku Impian",
                addBtn: "Tambah Buku Baru",
                closeBtn: "Tutup & Keluar",
                formTitle: "Tambah Buku Koleksi",
                formEditTitle: "Ubah Data Buku",
                uploadTitle: "Unggah Sampul Buku HD",
                uploadDesc: "(Format gambar dari perangkat Anda)",
                ratingLabel: "Penilaian (1-10):",
                saveBtn: "Simpan ke Rak",
                saveEditBtn: "Perbarui Rak",
                emptyShelf: "Rak masih kosong. Silakan tambah koleksi buku Anda. ✨",
                editBtnText: "Ubah Data",
                deleteBtnText: "Hapus Buku",
                deleteConfirm: "Apakah Anda yakin ingin menghapus buku ini dari koleksi?",
                publisher: "Penerbit",
                releaseDate: "Tgl Rilis",
                pages: "Halaman",
                bestTime: "Waktu Terbaik Membaca:",
                reviewSection: "Catatan Pembaca:",
                worthIt: "Sangat Rekomen",
                notWorthIt: "Kurang Rekomen",
                alertName: "Silakan ketik nama akun atau grup terlebih dahulu! 🌸"
            },
            en: {
                welcomeTitle: "Classic Library",
                welcomeDesc: "A serene space to store and cherish your favorite reads.",
                typePersonal: "👤 Personal",
                typeGroup: "👥 Bookclub/Group",
                openBtn: "Enter Sanctuary",
                mainTitle: "Dream Bookshelf",
                addBtn: "Add New Book",
                closeBtn: "Close & Logout",
                formTitle: "Add to Collection",
                formEditTitle: "Edit Book Details",
                uploadTitle: "Upload HD Book Cover",
                uploadDesc: "(Image format from your device)",
                ratingLabel: "Rating (1-10):",
                saveBtn: "Save to Shelf",
                saveEditBtn: "Update Shelf",
                emptyShelf: "The shelf is empty. Please add to your book collection. ✨",
                editBtnText: "Edit Details",
                deleteBtnText: "Delete Book",
                deleteConfirm: "Are you sure you want to remove this book from the collection?",
                publisher: "Publisher",
                releaseDate: "Release",
                pages: "Pages",
                bestTime: "Best Time to Read:",
                reviewSection: "Reader's Note:",
                worthIt: "Highly Recommended",
                notWorthIt: "Not Recommended",
                alertName: "Please enter your account or group name first! 🌸"
            }
        };

        let currentLang = 'id';
        // Placeholder Terjemahan Dinamis (Atribut placeholder HTML tidak otomatis via innerText)
        function updatePlaceholders() {
            document.getElementById('usernameInput').placeholder = currentLang === 'id' ? "Ketik nama akun/grup di sini..." : "Type account/group name here...";
        }

        function switchLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    el.innerText = translations[lang][key];
                }
            });
            updatePlaceholders();
            tampilkanRak(); 
        }
        function t(key) { return translations[currentLang][key]; }

        // --- State Manajemen Multi Akun ---
        let koleksiBuku = [];
        let editingBookId = null; 
        let base64Cover = "";
        let currentUserKey = ""; // Akan diisi saat login
        const defaultCover = "https://via.placeholder.com/400x600/FFC4D9/7B5061?text=No+Cover";

        // --- LOGIC LOGIN & TRANSISI LAYAR ---
        function prosesLogin() {
            const usernameInput = document.getElementById('usernameInput');
            const username = usernameInput.value.trim();
            
            if(!username) {
                alert(t('alertName'));
                usernameInput.focus();
                return;
            }

            const accType = document.querySelector('input[name="accType"]:checked').value;
            
            // Format ID Unik untuk Penyimpanan LocalStorage
            // Contoh: account_personal_nurfaiqoh atau account_group_klubbukuku
            currentUserKey = `bukuPinkyCantik_${accType}_${username.toLowerCase().replace(/\s+/g, '')}`;
            
            // Tampilkan tag akun di atas rak
            const icon = accType === 'personal' ? '👤 ' : '👥 ';
            document.getElementById('activeUserDisplay').innerText = icon + username;

            // Muat data khusus akun ini
            koleksiBuku = JSON.parse(localStorage.getItem(currentUserKey)) || [];

            masukPerpustakaan();
        }

        function masukPerpustakaan() {
            const loginScreen = document.getElementById('login-screen');
            const mainApp = document.getElementById('main-app');
            loginScreen.classList.add('open-curtain');
            
            setTimeout(() => {
                loginScreen.style.display = 'none';
                mainApp.style.display = 'block';
                setTimeout(() => { mainApp.style.opacity = '1'; }, 50);
                tampilkanRak(); 
            }, 1800); 
        }

        function keluarPerpustakaan() {
            const loginScreen = document.getElementById('login-screen');
            const mainApp = document.getElementById('main-app');
            
            // Reset input form
            document.getElementById('usernameInput').value = '';
            currentUserKey = ''; 
            koleksiBuku = [];
            
            mainApp.style.opacity = '0';
            setTimeout(() => {
                mainApp.style.display = 'none';
                loginScreen.style.display = 'flex';
                void loginScreen.offsetWidth; // trigger reflow
                loginScreen.classList.remove('open-curtain');
            }, 1000);
        }

        // --- Kontrol Modal dengan Animasi Menutup Buku ---
        function bukaModal(id) { document.getElementById(id).classList.add('active'); }
        
        function tutupModal(id) { 
            const modal = document.getElementById(id);
            if(id === 'modalDetail') {
                modal.classList.add('closing'); // Memicu animasi buku menutup
                setTimeout(() => {
                    modal.classList.remove('active', 'closing');
                }, 700); 
            } else {
                modal.classList.remove('active');
            }
        }

        function bukaModalTambah() {
            editingBookId = null;
            document.getElementById('book-form').reset();
            document.getElementById('modalFormTitle').innerText = t('formTitle');
            document.getElementById('submitFormBtn').innerText = t('saveBtn');
            document.getElementById('coverPreview').style.display = 'none';
            base64Cover = defaultCover;
            bukaModal('modalForm');
        }

        // --- Pengolahan Media HD ---
        document.getElementById('fileCover').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_WIDTH = 600; 
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        base64Cover = canvas.toDataURL('image/jpeg', 0.85);
                        document.getElementById('coverPreview').src = base64Cover;
                        document.getElementById('coverPreview').style.display = 'block';
                    }
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // --- Submit Form (Dinamic Storage) ---
        document.getElementById('book-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const dataBuku = {
                judul: document.getElementById('judul').value,
                penulis: document.getElementById('penulis').value,
                penerbit: document.getElementById('penerbit').value || '-',
                halaman: document.getElementById('halaman').value || '-',
                tanggalTerbit: document.getElementById('tanggalTerbit').value || '-',
                rating: parseInt(document.getElementById('rating').value),
                cocokSaat: document.getElementById('cocokSaat').value || '-',
                review: document.getElementById('review').value,
                bubble: document.getElementById('bubble').value
            };

            if (editingBookId !== null) {
                const index = koleksiBuku.findIndex(b => b.id === editingBookId);
                if (index !== -1) koleksiBuku[index] = { ...koleksiBuku[index], ...dataBuku, cover: base64Cover };
                editingBookId = null;
            } else {
                koleksiBuku.push({ id: Date.now(), cover: base64Cover || defaultCover, ...dataBuku });
            }

            // Simpan ke kunci unik milik akun tersebut
            localStorage.setItem(currentUserKey, JSON.stringify(koleksiBuku));
            tutupModal('modalForm');
            tampilkanRak();
        });

        // --- Render Rak & Detail ---
        function tampilkanRak() {
            const container = document.getElementById('library-container');
            container.innerHTML = '';

            // Pastikan jika ada perubahan bahasa, subtitle akun berubah
            const activeTag = document.getElementById('activeUserDisplay').innerText;
            if(activeTag.startsWith('👥') && currentLang === 'en') document.getElementById('activeUserDisplay').innerText = activeTag.replace('Grup', 'Group');

            if(koleksiBuku.length === 0) {
                container.innerHTML = `<p style="text-align:center; font-style: italic; color: var(--primary-dark); font-size: 1.1em; background: rgba(255,255,255,0.5); padding: 20px; border-radius:20px;">${t('emptyShelf')}</p>`;
                return;
            }

            for (let i = 0; i < koleksiBuku.length; i += 6) {
                const barisBuku = koleksiBuku.slice(i, i + 6);
                const shelf = document.createElement('div');
                shelf.className = 'shelf-row';
                
                barisBuku.forEach(buku => {
                    const bookEl = document.createElement('div');
                    bookEl.className = 'book-spine';
                    bookEl.style.backgroundImage = `url(${buku.cover})`;
                    bookEl.onclick = () => lihatDetailBuku(buku.id);
                    shelf.appendChild(bookEl);
                });
                container.appendChild(shelf);
            }
        }

        function lihatDetailBuku(id) {
            const buku = koleksiBuku.find(b => b.id === id);
            if(!buku) return;

            const isWorth = buku.rating >= 7 ? t('worthIt') : t('notWorthIt');
            const stars = '★'.repeat(Math.ceil(buku.rating / 2)) + '☆'.repeat(5 - Math.ceil(buku.rating / 2));

            const html = `
                <div class="book-spread">
                    <span class="close-btn" onclick="tutupModal('modalDetail')" style="position: absolute; right: 25px; top: 15px; background: white; padding: 2px 10px; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">✖</span>
                    
                    <div class="page-left">
                        <img src="${buku.cover}" class="detail-cover-3d">
                        <h2 class="detail-title">${buku.judul}</h2>
                        <p class="detail-author">${buku.penulis}</p>
                        
                        <div style="text-align: center; margin-bottom: 10px;">
                            <div style="font-size: 1.8em; color: var(--accent); margin-bottom: 5px;">${stars}</div>
                            <span style="font-size: 0.9em; background: var(--secondary); color: var(--primary-dark); font-weight: bold; padding: 6px 18px; border-radius: 20px;">Skor: ${buku.rating}/10 - ${isWorth}</span>
                        </div>
                        
                        <div class="book-meta-grid">
                            <div class="meta-item">
                                <span class="meta-label">${t('publisher')}</span>
                                <span class="meta-value">${buku.penerbit}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">${t('releaseDate')}</span>
                                <span class="meta-value">${buku.tanggalTerbit}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">${t('pages')}</span>
                                <span class="meta-value">${buku.halaman}</span>
                            </div>
                        </div>
                    </div>

                    <div class="page-right">
                        <p style="font-size: 0.95em; color: var(--text-dark);"><strong>☕ ${t('bestTime')}</strong> <br> <span style="color: var(--primary-dark);">${buku.cocokSaat}</span></p>

                        <div class="bubble-chat">"${buku.bubble}"</div>

                        <div style="margin-top: 25px;">
                            <h3 style="font-size: 1.2em; border-bottom: 2px solid var(--secondary); padding-bottom: 8px; margin-bottom: 15px; color: var(--primary-dark);">${t('reviewSection')}</h3>
                            <p style="line-height: 1.8; font-size: 0.95em; text-align: justify;">${buku.review}</p>
                        </div>

                        <div style="display: flex; gap: 10px; margin-top: 40px; border-top: 2px dashed var(--secondary); padding-top: 20px;">
                            <button onclick="bukaFormEdit(${buku.id})" class="btn" style="flex: 1; padding: 10px;">${t('editBtnText')}</button>
                            <button onclick="hapusBuku(${buku.id})" class="btn btn-outline" style="padding: 10px;">${t('deleteBtnText')}</button>
                        </div>
                    </div>
                </div>
            `;
            
            const modalDetail = document.getElementById('modalDetail');
            modalDetail.classList.remove('closing');
            document.getElementById('detailContent').innerHTML = html;
            bukaModal('modalDetail');
        }

        function bukaFormEdit(id) {
            const buku = koleksiBuku.find(b => b.id === id);
            if(!buku) return;

            editingBookId = id; 
            tutupModal('modalDetail'); 

            document.getElementById('judul').value = buku.judul;
            document.getElementById('penulis').value = buku.penulis;
            document.getElementById('penerbit').value = buku.penerbit === '-' ? '' : buku.penerbit;
            document.getElementById('halaman').value = buku.halaman === '-' ? '' : buku.halaman;
            document.getElementById('tanggalTerbit').value = buku.tanggalTerbit === '-' ? '' : buku.tanggalTerbit;
            document.getElementById('rating').value = buku.rating;
            document.getElementById('cocokSaat').value = buku.cocokSaat === '-' ? '' : buku.cocokSaat;
            document.getElementById('review').value = buku.review;
            document.getElementById('bubble').value = buku.bubble;

            base64Cover = buku.cover;
            document.getElementById('coverPreview').src = buku.cover;
            document.getElementById('coverPreview').style.display = 'block';

            document.getElementById('modalFormTitle').innerText = t('formEditTitle');
            document.getElementById('submitFormBtn').innerText = t('saveEditBtn');
            bukaModal('modalForm');
        }

        function hapusBuku(id) {
            if(confirm(t('deleteConfirm'))) {
                koleksiBuku = koleksiBuku.filter(b => b.id !== id);
                localStorage.setItem(currentUserKey, JSON.stringify(koleksiBuku));
                tutupModal('modalDetail');
                tampilkanRak();
            }
        }
    </script>
</body>
</html>
